server:
  port: 8901
feign:
  okhttp:
    enabled: true # 开启OKHttp功能
  sentinel:
    enabled: true # 开启Sentinel功能
hm:
  db:
    database: hm-cart
  swagger:
    title: "购物车服务接口文档"
    packages: com.hmall.cart.controller
spring:
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8090 # 指定sentinel控制台地址
      http-method-specify: true # 开启http方法指定,设置请求方式作为资源名称
